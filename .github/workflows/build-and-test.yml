name: build-and-test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build sdist and wheel
        run: |
          python -m pip install -U pip build
          python -m build -s -w

      - name: Install wheel and smoke-check metadata
        run: |
          python -m pip install dist/*.whl
          python - << 'PY'
          import importlib.metadata as md
          print("quantumhall_matrixelements version:", md.version("quantumhall_matrixelements"))
          PY

      - name: Install test and QA dependencies
        run: |
          python -m pip install -U pytest pytest-cov ruff mypy mpmath

      - name: Lint
        run: |
          ruff check .

      - name: Type check
        run: |
          mypy .

      - name: Run tests
        run: |
          pytest -q
